syntax = "proto3";

package pubsub;

import "rpc/proto/rpc.proto";

import "rpc/proto/battle.proto";

import "google/protobuf/empty.proto";

option go_package = "github.com/CryptoElementals/common/rpc/proto;proto";

// PubSub服务定义
service PubSubService {
  // 发布消息
  rpc Publish(PublishRequest) returns (PublishResponse);
  
  // 订阅主题
  rpc Subscribe(SubscribeRequest) returns (stream Message);
  
  // 取消订阅
  rpc Unsubscribe(UnsubscribeRequest) returns (UnsubscribeResponse);
  
  // 获取主题列表
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse);
  
  // 获取主题的订阅者数量
  rpc GetSubscriberCount(GetSubscriberCountRequest) returns (GetSubscriberCountResponse);
}

// 发布消息请求
message PublishRequest {
  string Topic = 1;
  Event Event = 2;
  map<string, string> Metadata = 3;
  int64 Timestamp = 4;
}

// 发布消息响应
message PublishResponse {
  string MessageId = 1;
  int32 SubscriberCount = 2;
  bool Success = 3;
  string Error = 4;
}

// 订阅请求
message SubscribeRequest {
  string Topic = 1;
  string SubscriberId = 2;
}

// 消息
message Message {
  string MessageId = 1;
  string Topic = 2;
  Event Event = 3;
  map<string, string> Metadata = 4;
  int64 Timestamp = 5;
  string PublisherId = 6;
}

// 取消订阅请求
message UnsubscribeRequest {
  string Topic = 1;
  string SubscriberId = 2;
}

// 取消订阅响应
message UnsubscribeResponse {
  bool Success = 1;
  string Error = 2;
}

// 获取主题列表请求
message ListTopicsRequest {
  string Pattern = 1; // 可选的主题模式匹配
}

// 获取主题列表响应
message ListTopicsResponse {
  repeated TopicInfo Topics = 1;
}

// 主题信息
message TopicInfo {
  string Name = 1;
  int32 SubscriberCount = 2;
  int64 LastMessageTime = 3;
  int64 MessageCount = 4;
}

// 获取订阅者数量请求
message GetSubscriberCountRequest {
  string Topic = 1;
}

// 获取订阅者数量响应
message GetSubscriberCountResponse {
  string Topic = 1;
  int32 SubscriberCount = 2;
  bool Success = 3;
  string Error = 4;
} 

message GameCreated {
  uint32 GameId = 1;
  repeated rpc.PlayerAddress Players = 2; 
}

message GameReady {
  uint32 GameId = 1;
}

message RoundReady {
  uint32 GameId = 1;
  uint32 RoundNum = 2;
}

message CommitmentsOnChain {
  uint32 GameId = 1;
  uint32 RoundNum = 2;
  uint32 CardNum = 3;
}

message CardsOnChain {
  uint32 GameId = 1;
  uint32 RoundNum = 2;
  rpc.RoundSubmittedCard MyCard = 3;
  rpc.RoundSubmittedCard RivalCard = 4;
}

message RoundCompleted {
  uint32 GameId = 1;
  uint32 RoundNumber = 2;
}

message GameCompleted {
  uint32 GameId = 1;
  battle.GameResult GameResult = 2;
}

message GameStat {
  uint32 GameId = 1;
  string ContractAddress = 2;
  repeated rpc.PlayerAddress Players = 3; 
  uint32 CurrentRoundNum = 4;
  uint32 CurrentCardNum = 5;

}

enum EventType {
  TYPE_KNOWN = 0;
  TYPE_MATCHED = 1;
  TYPE_PART_CONFIRMED = 2;
  TYPE_GAME_CREATED = 3;
  TYPE_ROUND_READY = 4;
  TYPE_COMMITMENTS_ON_CHAIN = 5;
  TYPE_CARDS_ON_CHAIN = 6;
  TYPE_ROUND_COMPLETE = 7;
  TYPE_GAME_COMPLETE = 8;
  TYPE_PLAYER_OFFLINE = 9;
  TYPE_CONTINUE_CANCELED = 10;
  TYPE_STAT_SYNC = 11;
}

message Event {
  EventType Type = 1;
  oneof Event {
    GameCreated GameCreated = 2; // TYPE_MATCHED
    GameReady GameReady = 3; // TYPE_GAME_CREATED
    RoundReady RoundReady = 4; // TYPE_ROUND_READY
    CommitmentsOnChain CommitmentsOnChain = 5; // TYPE_COMMITMENTS_ON_CHAIN
    CardsOnChain CardsOnChain = 6; // TYPE_CARDS_ON_CHAIN
    RoundCompleted RoundCompleted = 7; // TYPE_ROUND_COMPLETE
    GameCompleted GameCompleted = 8; // TYPE_GAME_COMPLETE
    google.protobuf.Empty _ = 9; // other events
  }
}