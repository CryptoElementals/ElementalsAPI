syntax = "proto3";

package pubsub;

import "rpc/proto/rpc.proto";

import "rpc/proto/battle.proto";

import "google/protobuf/empty.proto";

option go_package = "github.com/CryptoElementals/common/rpc/proto;proto";

// PubSub服务定义
service PubSubService {
  // 发布消息
  rpc Publish(PublishRequest) returns (PublishResponse);
  
  // 订阅主题
  rpc Subscribe(SubscribeRequest) returns (stream Message);
  
  // 取消订阅
  rpc Unsubscribe(UnsubscribeRequest) returns (UnsubscribeResponse);
  
  // 获取主题列表
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse);
  
  // 获取主题的订阅者数量
  rpc GetSubscriberCount(GetSubscriberCountRequest) returns (GetSubscriberCountResponse);
}

// 发布消息请求
message PublishRequest {
  string Topic = 1;
  Event Event = 2;
  map<string, string> Metadata = 3;
  int64 Timestamp = 4;
}

// 发布消息响应
message PublishResponse {
  string MessageId = 1;
  int32 SubscriberCount = 2;
  bool Success = 3;
  string Error = 4;
}

// 订阅请求
message SubscribeRequest {
  string Topic = 1;
  string SubscriberId = 2;
}

// 消息
message Message {
  string MessageId = 1;
  string Topic = 2;
  Event Event = 3;
  map<string, string> Metadata = 4;
  int64 Timestamp = 5;
  string PublisherId = 6;
}

// 取消订阅请求
message UnsubscribeRequest {
  string Topic = 1;
  string SubscriberId = 2;
}

// 取消订阅响应
message UnsubscribeResponse {
  bool Success = 1;
  string Error = 2;
}

// 获取主题列表请求
message ListTopicsRequest {
  string Pattern = 1; // 可选的主题模式匹配
}

// 获取主题列表响应
message ListTopicsResponse {
  repeated TopicInfo Topics = 1;
}

// 主题信息
message TopicInfo {
  string Name = 1;
  int32 SubscriberCount = 2;
  int64 LastMessageTime = 3;
  int64 MessageCount = 4;
}

// 获取订阅者数量请求
message GetSubscriberCountRequest {
  string Topic = 1;
}

// 获取订阅者数量响应
message GetSubscriberCountResponse {
  string Topic = 1;
  int32 SubscriberCount = 2;
  bool Success = 3;
  string Error = 4;
}

message GameMatched {
  int64 ConfirmationTimeout = 1;
  repeated rpc.PlayerAddress Players = 2;
  // Queue PVP: snowflake for ConfirmMatch; 0 for lobby-only signals (e.g. tournament before GameReady).
  int64 MatchId = 3;
  // Continue rematch after a finished game; unset for first-time queue matches.
  optional uint32 LastGameId = 4;
}

message MatchCanceled {
  int64 MatchId = 1;
  repeated rpc.PlayerAddress Players = 2;
  bool FromTimeout = 3;
}

message NotMatchable {
  uint32 last_game_id = 1;
}

// Sent by the lobby after token/points settlement (BattleResultSettlement). Reward is not included on TurnCompleted.GameResult.
message GameSettlementResult {
  uint32 GameId = 1;
  battle.BattleReward Reward = 2;
}

// Sent by the room on topic room_settlement when a game ends. Lobby subscribes and loads full state from DB.
message GameCompletedNotice {
  uint32 GameId = 1;
}

message GameReady {
  uint32 GameId = 1;
  uint32 InitialHP = 2;
  repeated rpc.PlayerAddress Players = 3;
  int64 MatchId = 4;
  uint32 RegulationRounds = 5;
  uint32 OvertimeRounds = 6;
  uint32 RegulationTurnsPerRound = 7;
  uint32 OvertimeTurnsPerRound = 8;
  uint32 MaxHP = 9;
}

message RoundReady {
  uint32 GameId = 1;
  uint32 RoundNum = 2;
}

message TurnReady {
  uint32 GameId = 1;
  uint32 RoundNum = 2;
  uint32 TurnNum = 3;
  int64 CommitmentSubmissionTimeout = 4;
}

message CommitmentsOnChain {
  uint32 GameId = 1;
  uint32 RoundNum = 2;
  uint32 TurnNum = 3;
  int64 CardSubmissionTimeout = 4;
}

message PlayerTurnInfo {
  rpc.PlayerAddress PlayerAddress = 1;
  rpc.RoundSubmittedCard SubmittedCard = 2;
}

message TurnCompleted {
  uint32 GameId = 1;
  uint32 RoundNum = 2;
  uint32 TurnNum = 3;
  bool IsRoundComplete = 4;
  bool IsGameComplete = 5;
  repeated PlayerTurnInfo PlayerTurnInfos = 6;
  optional battle.GameResult GameResult = 7;
  optional int64 ConfirmationTimeout = 8;
  optional int64 GameContinueTimeout = 9;
}

message GameStat {
  uint32 GameId = 1;
  string ContractAddress = 2;
  repeated rpc.PlayerAddress Players = 3;
  uint32 CurrentRoundNum = 4;
  uint32 CurrentTurnNum = 5;
}

enum EventType {
  TYPE_KNOWN = 0;
  TYPE_MATCHED = 1;
  TYPE_PART_CONFIRMED = 2;
  TYPE_GAME_CREATED = 3;
  TYPE_ROUND_READY = 4;
  TYPE_TURN_READY = 5;
  TYPE_COMMITMENTS_ON_CHAIN = 6;
  TYPE_TURN_COMPLETE = 7;
  TYPE_PLAYER_OFFLINE = 8;
  TYPE_GAME_PHASE_SYNC = 9;
  TYPE_MATCH_CANCELED = 10;
  TYPE_NOT_MATCHABLE = 11;
  TYPE_GAME_SETTLEMENT_RESULT = 12;
  TYPE_GAME_COMPLETED = 13;
}

message Event {
  EventType Type = 1;
  // Intended recipients for client-facing streams (room_events / lobby_events); subscribers filter on this. Leave unset for internal-only topics (e.g. room_settlement).
  repeated rpc.PlayerAddress receivers = 13;
  oneof Event {
    GameMatched GameMatched = 2;
    GameReady GameReady = 3;
    RoundReady RoundReady = 4;
    CommitmentsOnChain CommitmentsOnChain = 5;
    TurnCompleted TurnCompleted = 6;
    rpc.GamePhase GamePhase = 7;
    TurnReady TurnReady = 8;
    google.protobuf.Empty _ = 9;
    MatchCanceled MatchCanceled = 10;
    NotMatchable NotMatchable = 11;
    GameSettlementResult GameSettlementResult = 12;
    GameCompletedNotice GameCompletedNotice = 14;
  }
}
