syntax = "proto3";

package pubsub;

import "rpc/proto/rpc.proto";

import "rpc/proto/battle.proto";

import "google/protobuf/empty.proto";

option go_package = "github.com/CryptoElementals/common/rpc/proto;proto";

// PubSub服务定义
service PubSubService {
  // 发布消息
  rpc Publish(PublishRequest) returns (PublishResponse);
  
  // 订阅主题
  rpc Subscribe(SubscribeRequest) returns (stream Message);
  
  // 取消订阅
  rpc Unsubscribe(UnsubscribeRequest) returns (UnsubscribeResponse);
  
  // 获取主题列表
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse);
  
  // 获取主题的订阅者数量
  rpc GetSubscriberCount(GetSubscriberCountRequest) returns (GetSubscriberCountResponse);
}

// 发布消息请求
message PublishRequest {
  string Topic = 1;
  Event Event = 2;
  map<string, string> Metadata = 3;
  int64 Timestamp = 4;
}

// 发布消息响应
message PublishResponse {
  string MessageId = 1;
  int32 SubscriberCount = 2;
  bool Success = 3;
  string Error = 4;
}

// 订阅请求
message SubscribeRequest {
  string Topic = 1;
  string SubscriberId = 2;
}

// 消息
message Message {
  string MessageId = 1;
  string Topic = 2;
  Event Event = 3;
  map<string, string> Metadata = 4;
  int64 Timestamp = 5;
  string PublisherId = 6;
}

// 取消订阅请求
message UnsubscribeRequest {
  string Topic = 1;
  string SubscriberId = 2;
}

// 取消订阅响应
message UnsubscribeResponse {
  bool Success = 1;
  string Error = 2;
}

// 获取主题列表请求
message ListTopicsRequest {
  string Pattern = 1; // 可选的主题模式匹配
}

// 获取主题列表响应
message ListTopicsResponse {
  repeated TopicInfo Topics = 1;
}

// 主题信息
message TopicInfo {
  string Name = 1;
  int32 SubscriberCount = 2;
  int64 LastMessageTime = 3;
  int64 MessageCount = 4;
}

// 获取订阅者数量请求
message GetSubscriberCountRequest {
  string Topic = 1;
}

// 获取订阅者数量响应
message GetSubscriberCountResponse {
  string Topic = 1;
  int32 SubscriberCount = 2;
  bool Success = 3;
  string Error = 4;
} 

message GameMatched {
  int64 ConfirmationTimeout = 1;
  repeated rpc.PlayerAddress Players = 2;
  // Queue PVP: snowflake id for ConfirmMatch RPC. Zero for modes that only use this event as a lobby signal (e.g. tournament before GameReady).
  int64 MatchId = 3;
}

// GameContinuable is sent when both players chose to continue after a game; same ConfirmMatch flow as TYPE_MATCHED once pending.
message GameContinuable {
  int64 ConfirmationTimeout = 1;
  repeated rpc.PlayerAddress Players = 2;
  int64 MatchId = 3;
  uint32 LastGameId = 4;
}

// MatchCanceled is sent to both players when a pending game_match is cancelled (CancelMatch RPC or confirmation timeout).
message MatchCanceled {
  int64 MatchId = 1;
  repeated rpc.PlayerAddress Players = 2;
  bool FromTimeout = 3;
}

message GameReady {
  uint32 GameId = 1;
  uint32 InitialHP = 4;
  uint32 InitialMultiplier = 5;
  repeated rpc.PlayerAddress Players = 6;
  // Set when the game was created from a queue game_match (same snowflake as TYPE_MATCHED / ConfirmMatch). Zero otherwise.
  int64 MatchId = 7;
  uint32 RegulationRounds = 8;
  uint32 OvertimeRounds = 9;
  uint32 RegulationTurnsPerRound = 10;
  uint32 OvertimeTurnsPerRound = 11;
}

message RoundReady {
  uint32 GameId = 1;
  uint32 RoundNum = 2;
}

message TurnReady {
  uint32 GameId = 1;
  uint32 RoundNum = 2;
  uint32 TurnNum = 3;
	int64 CommitmentSubmissionTimeout = 4;
}

message CommitmentsOnChain {
  uint32 GameId = 1;
  uint32 RoundNum = 2;
  uint32 TurnNum = 3;
  int64 CardSubmissionTimeout = 4;
}

message PlayerTurnInfo {
  rpc.PlayerAddress PlayerAddress = 1;
  rpc.RoundSubmittedCard SubmittedCard = 2;
}

message TurnCompleted {
  uint32 GameId = 1;
  uint32 RoundNum = 2;
  uint32 TurnNum = 3;
  bool IsRoundComplete = 4;
  bool IsGameComplete = 5;
  repeated PlayerTurnInfo PlayerTurnInfos = 6;
  optional battle.GameResult GameResult = 7;
  optional int64 ConfirmationTimeout = 8;
  optional int64 GameContinueTimeout = 9;
}

// Deprecated: RoundCompleted and GameCompleted are no longer used.
// Round and game completion are now indicated via TurnCompleted.IsRoundComplete and TurnCompleted.IsGameComplete flags.
// Keeping these message definitions for backward compatibility, but they should not be used in new code.
message RoundCompleted {
  uint32 GameId = 1;
  uint32 RoundNumber = 2;
}

message GameCompleted {
  uint32 GameId = 1;
  battle.GameResult GameResult = 2;
}

message GameStat {
  uint32 GameId = 1;
  string ContractAddress = 2;
  repeated rpc.PlayerAddress Players = 3; 
  uint32 CurrentRoundNum = 4;
  uint32 CurrentTurnNum = 5;
}

enum EventType {
  TYPE_KNOWN = 0;
  TYPE_MATCHED = 1;
  TYPE_PART_CONFIRMED = 2;
  TYPE_GAME_CREATED = 3;
  TYPE_ROUND_READY = 4;
  TYPE_TURN_READY = 5;
  TYPE_COMMITMENTS_ON_CHAIN = 6;
  TYPE_TURN_COMPLETE = 7; // Includes IsRoundComplete and IsGameComplete flags
  TYPE_ROUND_COMPLETE = 8; // Deprecated: Use TYPE_TURN_COMPLETE with IsRoundComplete flag
  TYPE_GAME_COMPLETE = 9; // Deprecated: Use TYPE_TURN_COMPLETE with IsGameComplete flag
  TYPE_PLAYER_OFFLINE = 10;
  TYPE_CONTINUE_CANCELED = 11;
  TYPE_GAME_PHASE_SYNC = 12;
  TYPE_GAME_CONTINUABLE = 13;
  TYPE_MATCH_CANCELED = 14;
}

message Event {
  EventType Type = 1;
  oneof Event {
    GameMatched GameMatched = 2; // TYPE_MATCHED
    GameContinuable GameContinuable = 12; // TYPE_GAME_CONTINUABLE
    MatchCanceled MatchCanceled = 13; // TYPE_MATCH_CANCELED
    GameReady GameReady = 3; // TYPE_GAME_CREATED
    RoundReady RoundReady = 4; // TYPE_ROUND_READY
    CommitmentsOnChain CommitmentsOnChain = 5; // TYPE_COMMITMENTS_ON_CHAIN
    TurnCompleted TurnCompleted = 6; // TYPE_TURN_COMPLETE (includes IsRoundComplete and IsGameComplete flags)
    rpc.GamePhase GamePhase = 9; // TYPE_GAME_PHASE_SYNC
    TurnReady TurnReady = 10; // TYPE_TURN_READY
    google.protobuf.Empty _ = 11; // other events
  }
}