syntax = "proto3";

package rpc;

import "google/protobuf/empty.proto";

option go_package = "github.com/CryptoElementals/common/rpc/proto;proto";

service LedgerService {
  rpc SubmitChainEvents(SubmitChainEventsRequest) returns (SubmitChainEventsResponse);
  rpc RequestWithdraw(RequestWithdrawRequest) returns (RequestWithdrawResponse);
  rpc ListChainTokenLedgers(ListChainTokenLedgersRequest) returns (ListChainTokenLedgersResponse);
  rpc GetTokenUnitRates(google.protobuf.Empty) returns (GetTokenUnitRatesResponse);
  rpc ConvertTokenAmount(ConvertTokenAmountRequest) returns (ConvertTokenAmountResponse);
}

enum EventApplyStatus {
  EVENT_APPLY_STATUS_UNSPECIFIED = 0;
  EVENT_APPLY_STATUS_DUPLICATE = 1;
  EVENT_APPLY_STATUS_FINALIZED = 2;
  EVENT_APPLY_STATUS_FAILED = 3;
}

message ChainDepositEvent {
  int64 player_id = 1;
  string from_address = 2;
  string amount_wei = 3;
  string new_credited_wei = 4;
}

message ChainWithdrawEvent {
  int64 player_id = 1;
  string operator = 2;
  string to_address = 3;
  string amount_wei = 4;
}

message ChainTokenEvent {
  uint64 chain_id = 1;
  uint64 block_number = 2;
  string block_hash = 3;
  uint64 timestamp = 4;
  string tx_hash = 5;
  uint32 log_index = 6;
  string collector_address = 7;
  string event_type = 8;

  oneof payload {
    ChainDepositEvent deposit = 9;
    ChainWithdrawEvent withdraw = 10;
  }
}

message SubmitChainEventsRequest {
  uint64 block_number = 1;
  repeated ChainTokenEvent events = 2;
}

message EventApplyResult {
  string tx_hash = 1;
  uint32 log_index = 2;
  EventApplyStatus status = 3;
  string message = 4;
  int32 token_delta = 5;
  int32 new_balance = 6;
}

message SubmitChainEventsResponse {
  repeated EventApplyResult results = 1;
}

message RequestWithdrawRequest {
  int64 player_id = 1;
  // token_amount is in-game token units (NOT wei). ledger-server converts it to wei before calling chain-server.
  int32 token_amount = 2;
  // signature is the user's withdraw authorization signature (hex-decoded bytes).
  bytes signature = 3;
}

message RequestWithdrawResponse {
  string request_id = 1;
  string tx_hash = 2;
  string collector_address = 3;
  uint64 ledger_id = 4;
  string status = 5;
}

message ListChainTokenLedgersRequest {
  int64 player_id = 1;
  string event_type = 2;
  string status = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message ChainTokenLedgerRecord {
  uint64 id = 1;
  string request_id = 2;
  int64 chain_id = 3;
  string tx_hash = 4;
  uint32 log_index = 5;
  uint64 block_number = 6;
  string block_hash = 7;
  string event_type = 8;
  int64 player_id = 9;
  string collector_address = 10;
  string amount_wei = 11;
  int32 token_delta = 12;
  string status = 13;
  string fail_reason = 14;
  string signature = 15;
  string from_address = 16;
  string to_address = 17;
  string operator = 18;
  string new_credited_wei = 19;
  int64 created_at = 20;
}

message ListChainTokenLedgersResponse {
  repeated ChainTokenLedgerRecord records = 1;
  int64 total = 2;
}

enum TokenAmountUnit {
  TOKEN_AMOUNT_UNIT_UNSPECIFIED = 0;
  TOKEN_AMOUNT_UNIT_TOKEN = 1;
  TOKEN_AMOUNT_UNIT_USDT = 2;
  TOKEN_AMOUNT_UNIT_WEI = 3;
}

message MulDivRate {
  string mul = 1;
  string div = 2;
}

message GetTokenUnitRatesResponse {
  MulDivRate token_to_usdt = 1;
  MulDivRate usdt_to_wei = 2;
  MulDivRate token_to_wei = 3;
  MulDivRate usdt_to_token = 4;
  MulDivRate wei_to_usdt = 5;
  MulDivRate wei_to_token = 6;
}

message ConvertTokenAmountRequest {
  TokenAmountUnit from_unit = 1;
  TokenAmountUnit to_unit = 2;
  string amount = 3;
}

message ConvertTokenAmountResponse {
  string amount = 1;
  string remainder = 2;
}
