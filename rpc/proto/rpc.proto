syntax = "proto3";

package rpc;

import "google/protobuf/empty.proto";

option go_package = "github.com/CryptoElementals/common/rpc/proto;proto";

service RpcService {
    // game related api
    rpc JoinQueue(PlayerAddress) returns (google.protobuf.Empty);
    rpc ExitQueue(PlayerAddress) returns (google.protobuf.Empty);
    rpc GetPlayerInfo(PlayerAddress) returns (PlayerInfo);
    rpc GetGameInfo(GetGameInfoRequest) returns (GameInfo);

    // chain related api
    rpc NewTransactions(TransactionBatch) returns (google.protobuf.Empty);
}

message PlayerAddress {
    string wallet_address = 1;
    string temporary_address = 2;
}

enum PlayerStatus {
    PLAYER_KNOWN = 0;
    PLAYER_IN_QUEUE = 1;
    PLAYER_MATCHED = 2;
    PLAYER_IN_GAME = 3;
}

message PlayerInfo {
    PlayerAddress address = 1;
    PlayerStatus status = 2;
    optional string room_id = 3;
}

message GetGameInfoRequest {
    string room_id = 1;
}

enum RoundStatus {
    ROUND_UNKNOWN = 0;
    ROUND_WAITTING_COMMITMENTS = 1;
    ROUND_COMMITMENT_SUBMITTED = 2;
    ROUND_WAITTING_CARDS = 3;
    ROUND_CARD_SUBMITTED = 4;
    ROUND_COMPLETED = 5;
}

message Card {
    string card_id = 1;
    repeated uint32 items = 2;
}

message RoundPlayer {
    PlayerAddress playerAddress = 1;
    repeated RoundCard cards = 2;
}

message RoundCard {
    uint32 begin_health = 1;
    uint32 end_health = 2;
    uint32 multiplier = 3; 
    bytes submitted_commitment = 4;
    Card submitted_card = 5;
}

message Round {
    int32 number = 1; // start from 1
    RoundStatus status = 2;
    repeated RoundPlayer players = 3;
}

enum GameStatus {
    GAME_UNKNOWN = 0;
    GAME_WAITTING_CONTRACT = 1;
    GAME_RUNNING = 2;
    GAME_END = 3;
}

enum ResultPlayerStatus {
    RESULT_PLAYER_KNOWN = 0;
    RESULT_PLAYER_WIN = 1;
    RESULT_PLAYER_LOSE = 2;
    RESULT_PLAYER_TIE = 3;
}

message ResultPlayer{
    PlayerAddress address = 1;
    int32 token_delta = 2;
    int32 points = 3;
    ResultPlayerStatus status = 4;
}

message GameResult {
    repeated ResultPlayer players = 1;
}

message GameInfo {
    string room_id = 1;
    string room_contract_address = 2;
    GameStatus status = 3;
    repeated string players = 4;
    repeated Round rounds = 5;
    optional GameResult result = 6;
}

message Transaction {
    bytes block_hash = 1;
    bytes content = 2;
}

message TransactionBatch {
    repeated Transaction txs = 1;
}

