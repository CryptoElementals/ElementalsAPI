syntax = "proto3";

package rpc;

import "google/protobuf/empty.proto";

import "rpc/proto/battle.proto";

option go_package = "github.com/CryptoElementals/common/rpc/proto;proto";

service RpcService {
    // game related api
    rpc JoinQueue(PlayerAddress) returns (google.protobuf.Empty);
    rpc ExitQueue(PlayerAddress) returns (google.protobuf.Empty);
    rpc ContinueGame(ContinueGameRequest) returns (google.protobuf.Empty);
    rpc GetGamePhase(PlayerAddress) returns (GamePhase);
    rpc IsPlayerInQueue(PlayerAddress) returns (IsPlayerInQueueResponse);
    rpc GetPlayerStatus(PlayerAddress) returns (GetPlayerStatusResponse);
    rpc GetBattleInfo(GetBattleInfoRequest) returns (GetBattleInfoResponse);
    rpc ConfirmBattle(ConfirmBattleRequest) returns (google.protobuf.Empty);
    rpc RefuseContinueGame(RefuseContinueGameRequest) returns (google.protobuf.Empty);
    rpc Surrender(SurrenderRequest)returns (google.protobuf.Empty);
    rpc GetGameTimeoutConfig(google.protobuf.Empty)returns(TimeoutConfig);
    rpc SubmitPlayerCommitment(SubmitPlayerCommitmentRequest) returns (google.protobuf.Empty);
    rpc SubmitPlayerCard(SubmitPlayerCardRequest) returns (google.protobuf.Empty);

    // token related logic
    rpc GetPlayerToken(GetPlayerTokenRequest) returns (GetPlayerTokenResponse);

    // chain related api
    rpc SubmitTransactions(TransactionBatch) returns (google.protobuf.Empty);
}

message TimeoutConfig {
    int64 GameMatchTimeout = 1;
	int64 RoundConfirmTimeout = 2;
	int64 RoundTimeout = 3;
	int64 ContinueTimeout = 4;
}

message UnregisterBotsRequest {
    repeated rpc.PlayerAddress PlayerAddresses =1;
}

message SurrenderRequest {
    uint32 GameID = 1;
    PlayerAddress Address = 2;
}

message IsPlayerInQueueResponse {
    bool IsInQueue = 1;
}

message GetPlayerStatusResponse {
    PlayerStatus Status = 1;
}

message GetPlayerTokenRequest {
    int64 id = 1;
}

message GetPlayerTokenResponse {
    int64 id = 1;
    uint64 Tokens = 2;
    uint64 Points = 3;
    uint64 LockedTokens = 4;
}

message PlayerAddress {
    int64 id = 1;
    string temporary_address = 2;
}

message ContinueGameRequest {
    PlayerAddress player = 1;
    uint32 LastGameID = 2;
}

message RefuseContinueGameRequest {
    PlayerAddress player = 1;
    uint32 LastGameID = 2;
}

enum PlayerStatus {
    PLAYER_UNKNOWN = 0;
    PLAYER_IN_QUEUE = 1;
    PLAYER_MATCHED = 2;
    PLAYER_IN_GAME = 3;
    PLAYER_WAITTING_CONTINUE = 4;
}

enum PlayerTurnStatus {
    PLAYER_TURN_UNKNOWN = 0;
    PLAYER_TURN_READY = 1;
    PLAYER_TURN_COMMITMENT_SUBMITTED = 2;
    PLAYER_TURN_CARD_SUBMITTED = 3;
}

message GamePhasePlayer {
    PlayerAddress Address = 1;
    PlayerTurnStatus TurnStatus = 2;
    uint32 CurrentHP = 3;
    uint32 CurrentMultiplier = 4;
    optional bytes Commitment = 7;
    optional uint32 Card = 8;
}

message GamePhase {
    GameType GameType = 1;
    uint32 GameID = 2;
    uint32 RoundNumber = 3;
    uint32 TurnNumber = 4;
    int64 TurnStartAt = 5;
    repeated GamePhasePlayer Players = 6;
}

message GetBattleInfoRequest {
    uint32 GameID = 1;
    uint32 RoundNumber = 2;
}

message GetBattleInfoResponse {
    battle.RoundResult round_result = 1;
    battle.GameResult game_result = 2;
}

message ConfirmBattleRequest {
    PlayerAddress PlayerAddress = 1;
    uint32 GameID = 2;
    uint32 RoundNumber = 3;
    uint32 TurnNumber = 4;
}

enum TurnStatus {
    TURN_WAITTING_BATTLE_CONFIRMATION = 0;
    TURN_WAITTING_SETUP_ON_CHAIN = 1;
    TURN_WAITTING_COMMITMENTS = 2;
    TURN_WAITTING_CARDS = 3;
    TURN_ROUND_COMPLETED = 4;  // Special state: round is completed
}


message PlayerRoundInfo {
    PlayerAddress PlayerAddress = 1;
    bool PlayerReady = 2;
    repeated RoundSubmittedCard SubmittedCards = 3;
}

// Battle Engine related messages
message RoundSubmittedCard {
    uint32 SubmittedCardId = 1;
    uint32 PlayerHealthBefore = 2;
    uint32 PlayerHealthEnd = 3;
    uint32 MultiplierBefore = 4;      // multiplier before this card
    uint32 MultiplierAfter = 5;       // multiplier after this card  
    string Description = 6;            // battle description
    battle.ElementRelation ElementRelation = 7;       // element relation type
    repeated battle.BattleEffect Effects = 8; // effects applied to this player
    bytes SubmittedCommitment = 9;
    bytes Salt = 10;
}

message Round {
    int32 Number = 1; // start from 1
    TurnStatus Status = 2;  // Current turn status
    repeated PlayerRoundInfo PlayerRoundInfos = 3;
}

enum GameStatus {
    GAME_INIT = 0;
    GAME_RUNNING = 1;
    GAME_END = 2;
    GAME_ABORTED = 3;
}


enum GameType {
    GAME_TYPE_UNKNOWN = 0;
    PVP = 1;
}

message GameInfo {
    uint32 game_id = 1;
    GameType game_type = 2;
    GameStatus status = 3;
    int32 initial_hp = 4;
    repeated PlayerAddress players = 5;
    repeated Round rounds = 6;
    optional battle.GameResult result = 7;
}

message Transaction {
    bytes tx_hash = 1;
    uint32 game_id = 2;
    oneof tx {
        TxGameCreated game_created = 3;
        TxGameTurnSetupReady game_turn_setup_ready = 4;
        TxCommitmentOnChain commitment_on_chain = 5;
        TxCardOnChain card_on_chain = 6;
    };
}

message TransactionBatch {
    bytes block_hash = 1;
    uint64 timestamp = 2;
    uint64 block_number = 3;
    repeated Transaction transactions = 4;
}

message TxGameCreated {
    int64 game_id = 1;
}

message TxGameTurnSetupReady {
    int64 game_id = 1;
    uint32 round_number = 2;
    uint32 turn_number = 3;
}

message TxCommitmentOnChain {
    int64 game_id = 1;
    PlayerAddress address = 2;
    uint32 round_number = 3;
    uint32 turn_number = 4;
    bytes commitment = 5;
}

message TxCardOnChain {
    int64 game_id = 1;
    PlayerAddress address = 2;
    uint32 round_number = 3;
    uint32 turn_number = 4;
    bytes salt = 5;
    uint32 card_id = 6;
}

message SubmitPlayerCommitmentRequest {
    uint32 GameID = 1;
    PlayerAddress Address = 2;
    uint32 RoundNumber = 3;
    bytes Commitment = 4;
    uint32 TurnNumber = 5;
    bytes Signature = 6;
}

message SubmitPlayerCardRequest {
    uint32 GameID = 1;
    PlayerAddress Address = 2;
    uint32 RoundNumber = 3;
    bytes Salt = 4;
    uint32 Card = 5;
    uint32 TurnNumber = 6;
    bytes Signature = 7;
}