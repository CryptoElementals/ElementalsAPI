syntax = "proto3";

package rpc;

import "google/protobuf/empty.proto";

import "rpc/proto/battle.proto";

option go_package = "github.com/CryptoElementals/common/rpc/proto;proto";

// RoomService is served by the room server.
// It merges game/player/chain RPCs and room-worker RPCs.
service RoomService {
    // game related api (queue / match / status / token live on LobbyService)
    rpc ConfirmBattle(ConfirmBattleRequest) returns (google.protobuf.Empty);
    rpc Surrender(SurrenderRequest)returns (google.protobuf.Empty);
    rpc SubmitPlayerCommitment(SubmitPlayerCommitmentRequest) returns (google.protobuf.Empty);
    rpc SubmitPlayerCard(SubmitPlayerCardRequest) returns (google.protobuf.Empty);

    // chain related api
    rpc SubmitTransactions(TransactionBatch) returns (google.protobuf.Empty);

    // lobby -> room worker api
    rpc CreateGameAndRun(CreateGameAndRunRequest) returns (CreateGameAndRunResponse);
    rpc SyncGamePhase(PlayerAddress) returns (google.protobuf.Empty);
}

message TimeoutConfig {
    int64 ConfirmationTimeout = 1;
	int64 CommitmentSubmissionTimeout = 2;
	int64 CardSubmissionTimeout = 3;
	int64 GameContinueTimeout = 4;
}

message UnregisterBotsRequest {
    repeated rpc.PlayerAddress PlayerAddresses = 1;
}

message SurrenderRequest {
    int64 GameID = 1;
    PlayerAddress Address = 2;
}

message GetPlayerStatusResponse {
    PlayerStatus Status = 1;
}

message GetPlayerTokenRequest {
    int64 id = 1;
}

message GetPlayerTokenResponse {
    int64 id = 1;
    uint64 Tokens = 2;
    uint64 Points = 3;
    uint64 LockedTokens = 4;
}

message PlayerAddress {
    int64 id = 1;
    string temporary_address = 2;
}

enum PlayerStatus {
    PLAYER_UNKNOWN = 0;
    PLAYER_IN_QUEUE = 1;
    PLAYER_MATCHED = 2;
    PLAYER_IN_GAME = 3;
    PLAYER_PENDING_QUEUE_MATCH = 4;
}

enum PlayerTurnStatus {
    PLAYER_TURN_UNKNOWN = 0;
    PLAYER_TURN_READY = 1;
    PLAYER_TURN_COMMITMENT_SUBMITTED = 2;
    PLAYER_TURN_CARD_SUBMITTED = 3;
}

message CardPlayingInfo {
    uint32 TurnNumber = 1;
    repeated bytes Commitment = 2;
    repeated uint32 Card = 3;
}

message GamePhasePlayer {
    PlayerAddress Address = 1;
    uint32 CurrentHP = 2;
    repeated CardPlayingInfo CardPlayingInfos = 3;
}

message GamePhase {
    GameType GameType = 1;
    int64 GameID = 2;
    uint32 RoundNumber = 3;
    uint32 TurnNumber = 4;
    int64 TurnStartAt = 5;
    PlayerTurnStatus PlayerTurnStatus = 6;
    repeated GamePhasePlayer Players = 7;
}

message ConfirmBattleRequest {
    PlayerAddress PlayerAddress = 1;
    int64 GameID = 2;
    uint32 RoundNumber = 3;
    uint32 TurnNumber = 4;
}

message ConfirmMatchRequest {
    PlayerAddress PlayerAddress = 1;
    int64 MatchId = 2;
}

message CancelMatchRequest {
    PlayerAddress PlayerAddress = 1;
    int64 MatchId = 2;
}

enum TurnStatus {
    TURN_WAITTING_BATTLE_CONFIRMATION = 0;
    TURN_WAITTING_SETUP_ON_CHAIN = 1;
    TURN_WAITTING_COMMITMENTS = 2;
    TURN_WAITTING_CARDS = 3;
    TURN_ROUND_COMPLETED = 4;  // Special state: round is completed
    TURN_COMPLETED = 5;
}


message PlayerRoundInfo {
    PlayerAddress PlayerAddress = 1;
    bool PlayerReady = 2;
    repeated RoundSubmittedCard SubmittedCards = 3;
}

// Battle Engine related messages
message RoundSubmittedCard {
    uint32 SubmittedCardId = 1;
    uint32 PlayerHealthBefore = 2;
    uint32 PlayerHealthEnd = 3;
    string Description = 4;
    battle.ElementRelation ElementRelation = 5;
    bytes SubmittedCommitment = 6;
    bytes Salt = 7;
}

message Round {
    int32 Number = 1; // start from 1
    TurnStatus Status = 2;  // Current turn status
    repeated PlayerRoundInfo PlayerRoundInfos = 3;
}

enum GameStatus {
    GAME_INIT = 0;
    GAME_RUNNING = 1;
    GAME_END = 2;
}


enum GameType {
    GAME_TYPE_UNKNOWN = 0;
    PVP = 1;
}

message GameInfo {
    int64 game_id = 1;
    GameType game_type = 2;
    GameStatus status = 3;
    int32 initial_hp = 4;
    repeated PlayerAddress players = 5;
    repeated Round rounds = 6;
    optional battle.GameResult result = 7;
}

message Transaction {
    bytes tx_hash = 1;
    int64 game_id = 2;
    oneof tx {
        TxGameCreated game_created = 3;
        TxGameTurnSetupReady game_turn_setup_ready = 4;
        TxCommitmentOnChain commitment_on_chain = 5;
        TxCardOnChain card_on_chain = 6;
    };
}

message TransactionBatch {
    bytes block_hash = 1;
    uint64 timestamp = 2;
    uint64 block_number = 3;
    repeated Transaction transactions = 4;
}

message TxGameCreated {
}

message TxGameTurnSetupReady {
    uint32 round_number = 1;
    uint32 turn_number = 2;
}

message TxCommitmentOnChain {
    PlayerAddress address = 1;
    uint32 round_number = 2;
    uint32 turn_number = 3;
    bytes commitment = 4;
}

message TxCardOnChain {
    PlayerAddress address = 1;
    uint32 round_number = 2;
    uint32 turn_number = 3;
    bytes salt = 4;
    uint32 card_id = 5;
}

message SubmitPlayerCommitmentRequest {
    int64 GameID = 1;
    PlayerAddress Address = 2;
    uint32 RoundNumber = 3;
    bytes Commitment = 4;
    uint32 TurnNumber = 5;
    bytes Signature = 6;
}

message SubmitPlayerCardRequest {
    int64 GameID = 1;
    PlayerAddress Address = 2;
    uint32 RoundNumber = 3;
    bytes Salt = 4;
    uint32 Card = 5;
    uint32 TurnNumber = 6;
    bytes Signature = 7;
}

message CreateGameAndRunRequest {
  repeated PlayerAddress players = 1;
  uint32 game_type = 2;
  // Queue PVP: snowflake game_match id after ConfirmMatch; 0 for tournament / no lobby match row.
  int64 completed_match_id = 3;
}

message CreateGameAndRunResponse {
  int64 game_id = 1;
}