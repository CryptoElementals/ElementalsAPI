syntax = "proto3";

package rpc;

import "google/protobuf/empty.proto";

import "rpc/proto/battle.proto";

option go_package = "github.com/CryptoElementals/common/rpc/proto;proto";

service RpcService {
    // game related api
    rpc JoinQueue(PlayerAddress) returns (google.protobuf.Empty);
    rpc ExitQueue(PlayerAddress) returns (google.protobuf.Empty);
    rpc ContinueGame(ContinueGameRequest) returns (google.protobuf.Empty);
    rpc GetGamePhase(PlayerAddress) returns (GamePhase);
    rpc IsPlayerInQueue(PlayerAddress) returns (IsPlayerInQueueResponse);
    rpc GetBattleInfo(GetBattleInfoRequest) returns (GetBattleInfoResponse);
    rpc ConfirmBattle(ConfirmBattleRequest) returns (google.protobuf.Empty);
    rpc RefuseContinueGame(RefuseContinueGameRequest) returns (google.protobuf.Empty);
    rpc Surrender(SurrenderRequest)returns (google.protobuf.Empty);

    // token related logic
    rpc GetPlayerToken(GetPlayerTokenRequest) returns (GetPlayerTokenResponse);

    // chain related api
    rpc SubmitTransactions(TransactionBatch) returns (google.protobuf.Empty);
}

message SurrenderRequest {
    uint32 GameID = 1;
    PlayerAddress Address = 2;
}

message IsPlayerInQueueResponse {
    bool IsInQueue = 1;
}

message GetPlayerTokenRequest {
    string WalletAddress = 1;
}

message GetPlayerTokenResponse {
    string WalletAddress = 1;
    uint64 Tokens = 2;
    uint64 Points = 3;
    uint64 LockedTokens = 4;
}

message PlayerAddress {
    string wallet_address = 1;
    string temporary_address = 2;
}

message ContinueGameRequest {
    PlayerAddress player = 1;
    uint32 LastGameID = 2;
}

message RefuseContinueGameRequest {
    PlayerAddress player = 1;
    uint32 LastGameID = 2;
}

enum PlayerStatus {
    PLAYER_UNKNOWN = 0;
    PLAYER_IN_QUEUE = 1;
    PLAYER_MATCHED = 2;
    PLAYER_IN_GAME = 3;
    PLAYER_WAITTING_CONTINUE = 4;
}

message GamePhasePlayer {
    PlayerAddress Address = 1;
    bool IsConfirmed = 2;
    bytes Commitment = 3;
    repeated uint32 Cards = 4;
}

message PvPInfo {
    uint32 GameID = 1;
    PlayerStatus Status = 2;
    string ContractAddress = 3;
    uint64 BeginAt = 4;
    uint64 TimeoutDuration = 5;
    uint64 RoundNumber = 6;
} 

message GamePhase {
    GameType GameType = 1;
    repeated GamePhasePlayer Players = 2;
    PvPInfo PvPInfo = 5;
}

message GetBattleInfoRequest {
    uint32 GameID = 1;
    uint32 RoundNumber = 2;
}

message GetBattleInfoResponse {
    battle.RoundResult round_result = 1;
    battle.GameResult game_result = 2;
}

message ConfirmBattleRequest {
    PlayerAddress PlayerAddress = 1;
    uint32 GameID = 2;
    uint32 RoundNumber = 3;
}

enum RoundStatus {
    ROUND_WAITTING_BATTLE_CONFIRMATION = 0;
    ROUND_WAITTING_SETUP_ON_CHAIN = 1;
    ROUND_WAITTING_COMMITMENTS = 2;
    ROUND_WAITTING_CARDS = 3;
    ROUND_COMPLETED = 4;
}


message PlayerRoundInfo {
    PlayerAddress PlayerAddress = 1;
    bool PlayerReady = 2;
    bytes Salt = 3;
    bytes SubmittedCommitment = 4;
    repeated RoundSubmittedCard SubmittedCards = 5;
}

// Battle Engine related messages


message RoundSubmittedCard {
    uint32 SubmittedCardId = 1;
    uint32 PlayerHealthBefore = 2;
    uint32 PlayerHealthEnd = 3;
    uint32 MultiplierBefore = 4;      // multiplier before this card
    uint32 MultiplierAfter = 5;       // multiplier after this card  
    string Description = 6;            // battle description
    battle.ElementRelation ElementRelation = 7;       // element relation type
    repeated battle.BattleEffect Effects = 8; // effects applied to this player
}

message Round {
    int32 number = 1; // start from 1
    RoundStatus status = 2;
    repeated PlayerRoundInfo player_round_infos = 3;
}

enum GameStatus {
    GAME_INIT = 0;
    GAME_RUNNING = 1;
    GAME_END = 2;
}


enum GameType {
    GAME_TYPE_UNKNOWN = 0;
    PVP = 1;
}

message GameInfo {
    uint32 game_id = 1;
    string room_contract_address = 2;
    GameType game_type = 3;
    GameStatus status = 4;
    int32 initial_hp = 5;
    repeated PlayerAddress players = 6;
    repeated Round rounds = 7;
    optional battle.GameResult result = 8;
}

message Transaction {
    bytes tx_hash = 1;
    oneof tx {
        TxRoomContractCreated room_contract_created = 2;
        TxRoomContractRoundSetupReady room_contract_setup_ready = 3;
        TxCommitmentsOnChain commitments_on_chain = 4;
        TxCardsOnChain cards_on_chain = 5;
    };
}

message TransactionBatch {
    bytes block_hash = 1;
    uint64 timestamp = 2;
    uint64 block_number = 3;
    repeated Transaction transactions = 4;
}

message TxRoomContractCreated {
    string room_contract_address = 1;
}

message TxRoomContractRoundSetupReady {
    string room_contract_address = 1;
    uint32 round_number = 2;
}

message TxCommitmentsOnChain {
    string room_contract_address = 1;
    PlayerAddress address = 2;
    uint32 round_number = 3;
    bytes commitment = 4;
}

message TxCardsOnChain {
    string room_contract_address = 1;
    PlayerAddress address = 2;
    uint32 round_number = 3;
    bytes salt = 4;
    repeated uint32 cards = 5;
}