syntax = "proto3";

package rpc;

import "rpc/proto/rpc.proto";

option go_package = "github.com/CryptoElementals/common/rpc/proto;proto";

// RoomWorkerService is served by the room server; lobby calls it to create games and read in-game status.
service RoomWorkerService {
  rpc CreatePvpGameAfterQueueConfirm(CreatePvpGameAfterQueueConfirmRequest) returns (CreatePvpGameAfterQueueConfirmResponse);
  rpc HandleGameMatchedEvent(HandleGameMatchedEventRequest) returns (HandleGameMatchedEventResponse);
  rpc GetPlayerGameStatus(PlayerAddress) returns (GetPlayerGameStatusResponse);
}

message CreatePvpGameAfterQueueConfirmRequest {
  repeated PlayerAddress players = 1;
  uint32 game_type = 2;
  int64 completed_match_id = 3;
}

message CreatePvpGameAfterQueueConfirmResponse {
  uint32 game_id = 1;
}

message HandleGameMatchedEventRequest {
  repeated PlayerAddress players = 1;
  int64 confirmation_timeout = 2;
  uint32 game_type = 3;
}

message HandleGameMatchedEventResponse {
  uint32 game_id = 1;
}

message GetPlayerGameStatusResponse {
  PlayerStatus status = 1;
}
