syntax = "proto3";

package rpc;

import "google/protobuf/empty.proto";
import "rpc/proto/rpc.proto";

option go_package = "github.com/CryptoElementals/common/rpc/proto;proto";

// LobbyService is served by the lobby server: PVP queue, status, tokens.
// Tournament join/exit RPCs will be added later; tournament logic runs in-process on lobby today.
service LobbyService {
  rpc JoinQueue(PlayerAddress) returns (google.protobuf.Empty);
  rpc ExitQueue(PlayerAddress) returns (google.protobuf.Empty);
  rpc ConfirmMatch(ConfirmMatchRequest) returns (google.protobuf.Empty);
  rpc CancelMatch(CancelMatchRequest) returns (google.protobuf.Empty);
  rpc GetPlayerStatus(PlayerAddress) returns (GetPlayerStatusResponse);
  rpc GetPlayerToken(GetPlayerTokenRequest) returns (GetPlayerTokenResponse);
  rpc EnsureUserToken(EnsureUserTokenRequest) returns (google.protobuf.Empty);
  rpc CreditUserTokens(CreditUserTokensRequest) returns (GetPlayerTokenResponse);
  rpc SetUserTokenAmount(SetUserTokenAmountRequest) returns (GetPlayerTokenResponse);
  // Bot queue registration (replaces room PubSub AddBotPlayer/RemoveBotPlayer hooks). Clients may also use lobby PubSub with subscriber_id prefix "bot".
  rpc RegisterBots(RegisterBotsForLobbyRequest) returns (google.protobuf.Empty);
  rpc UnregisterBots(RegisterBotsForLobbyRequest) returns (google.protobuf.Empty);
  //todo: tournament related rpc
  rpc JoinTournament(JoinTournamentRequest) returns (google.protobuf.Empty);
  // Latest registration-open tournament snapshot for clients.
  rpc GetLatestRegistrationOpenTournamentSnapshot(PlayerAddress) returns (GetLatestRegistrationOpenTournamentSnapshotResponse);
  // Latest in-progress tournament snapshot for reconnect/busy clients.
  rpc GetLatestInProgressTournamentSnapshot(PlayerAddress) returns (GetLatestRegistrationOpenTournamentSnapshotResponse);
  // Toggle/query tournament scheduling (creation of new tournaments).
  rpc SetTournamentScheduling(SetTournamentSchedulingRequest) returns (TournamentSchedulingStatus);
  rpc GetTournamentSchedulingStatus(google.protobuf.Empty) returns (TournamentSchedulingStatus);
}

message RegisterBotsForLobbyRequest {
  repeated PlayerAddress Addresses = 1;
}

message EnsureUserTokenRequest {
  int64 PlayerID = 1;
}

message CreditUserTokensRequest {
  int64 PlayerID = 1;
  int32 Delta = 2;
  string Reason = 3;
}

message SetUserTokenAmountRequest {
  int64 PlayerID = 1;
  int32 TokenAmount = 2;
}

message JoinTournamentRequest {
  PlayerAddress PlayerAddress = 1;
  string TournamentID = 2;
}

message TournamentRoundConfig {
  int32 TotalPlayerCount = 1;
  int32 TokenChange = 2;
  int32 PointChange = 3;
  int32 RemainingParticipantCount = 4;
}

// GetLatestRegistrationOpenTournamentSnapshotResponse describes the latest registration-open tournament row.
message GetLatestRegistrationOpenTournamentSnapshotResponse {
  bool HasTournament = 1;
  string TournamentID = 2;
  string TournamentStatus = 3;
  int64 ScheduledStartUnixSec = 4;
  int64 RegistrationDeadlineUnixSec = 5;
  int32 EntryFee = 6;
  int64 ParticipantCount = 7;
  bool PlayerRegistered = 8;
  string PlayerParticipantStatus = 9;
  repeated int32 TopFourRewardTokens = 10;
  int64 PrizePoolTokens = 11;
  int64 SecondsUntilScheduledStart = 12;
  int32 MinPlayersRequired = 13;
  map<int32, TournamentRoundConfig> MapRoundConfig = 14;
}

message SetTournamentSchedulingRequest {
  bool Enabled = 1;
}

message TournamentSchedulingStatus {
  bool Enabled = 1;
}