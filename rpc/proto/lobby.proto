syntax = "proto3";

package rpc;

import "google/protobuf/empty.proto";
import "rpc/proto/rpc.proto";

option go_package = "github.com/CryptoElementals/common/rpc/proto;proto";

// LobbyService is served by the lobby server: PVP queue, status, tokens, bots.
// Tournament join/exit RPCs will be added later; tournament logic runs in-process on lobby today.
service LobbyService {
  rpc JoinQueue(PlayerAddress) returns (google.protobuf.Empty);
  rpc ExitQueue(PlayerAddress) returns (google.protobuf.Empty);
  rpc ConfirmMatch(ConfirmMatchRequest) returns (google.protobuf.Empty);
  rpc CancelMatch(CancelMatchRequest) returns (google.protobuf.Empty);
  rpc GetPlayerStatus(PlayerAddress) returns (GetPlayerStatusResponse);
  rpc GetPlayerToken(GetPlayerTokenRequest) returns (GetPlayerTokenResponse);
  // Bot queue registration (replaces room PubSub AddBotPlayer/RemoveBotPlayer hooks). Clients may also use lobby PubSub with subscriber_id prefix "bot".
  rpc RegisterBots(RegisterBotsForLobbyRequest) returns (google.protobuf.Empty);
  rpc UnregisterBots(RegisterBotsForLobbyRequest) returns (google.protobuf.Empty);
}

message RegisterBotsForLobbyRequest {
  repeated PlayerAddress Addresses = 1;
}

// LobbySettlementService: room notifies lobby when a game completes (queue + tournament settlement).
service LobbySettlementService {
  rpc NotifyGameCompleted(NotifyGameCompletedRequest) returns (google.protobuf.Empty);
}

message NotifyGameCompletedRequest {
  uint32 GameId = 1;
}
