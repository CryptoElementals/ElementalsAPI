syntax = "proto3";

package pubsub;

option go_package = "github.com/grpc-pubsub/proto;pubsub";
option java_multiple_files = true;
option java_package = "com.grpc.pubsub";
option java_outer_classname = "PubSubProto";

// PubSub服务定义
service PubSubService {
  // 发布消息
  rpc Publish(PublishRequest) returns (PublishResponse);
  
  // 订阅主题
  rpc Subscribe(SubscribeRequest) returns (stream Message);
  
  // 取消订阅
  rpc Unsubscribe(UnsubscribeRequest) returns (UnsubscribeResponse);
  
  // 获取主题列表
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse);
  
  // 获取主题的订阅者数量
  rpc GetSubscriberCount(GetSubscriberCountRequest) returns (GetSubscriberCountResponse);
}

// 发布消息请求
message PublishRequest {
  string topic = 1;
  bytes message = 2;
  map<string, string> metadata = 3;
  int64 timestamp = 4;
}

// 发布消息响应
message PublishResponse {
  string message_id = 1;
  int32 subscriber_count = 2;
  bool success = 3;
  string error = 4;
}

// 订阅请求
message SubscribeRequest {
  string topic = 1;
  string subscriber_id = 2;
  map<string, string> filters = 3;
}

// 消息
message Message {
  string message_id = 1;
  string topic = 2;
  bytes content = 3;
  map<string, string> metadata = 4;
  int64 timestamp = 5;
  string publisher_id = 6;
}

// 取消订阅请求
message UnsubscribeRequest {
  string topic = 1;
  string subscriber_id = 2;
}

// 取消订阅响应
message UnsubscribeResponse {
  bool success = 1;
  string error = 2;
}

// 获取主题列表请求
message ListTopicsRequest {
  string pattern = 1; // 可选的主题模式匹配
}

// 获取主题列表响应
message ListTopicsResponse {
  repeated TopicInfo topics = 1;
}

// 主题信息
message TopicInfo {
  string name = 1;
  int32 subscriber_count = 2;
  int64 last_message_time = 3;
  int64 message_count = 4;
}

// 获取订阅者数量请求
message GetSubscriberCountRequest {
  string topic = 1;
}

// 获取订阅者数量响应
message GetSubscriberCountResponse {
  string topic = 1;
  int32 subscriber_count = 2;
  bool success = 3;
  string error = 4;
} 